name: Deploy Docs to Cloudflare Workers

on:
  push:
    branches: [main, 'feat/*']
    paths:
      - 'apps/docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy Production
    if: ${{ github.ref == 'refs/heads/main' && vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Build with OpenNext
        working-directory: apps/docs
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          command: deploy --keep-vars

  deploy-dev:
    runs-on: ubuntu-latest
    name: Deploy Dev
    if: ${{ startsWith(github.ref, 'refs/heads/feat/') && vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Build with OpenNext
        working-directory: apps/docs
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers (dev)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          command: deploy --env dev --keep-vars

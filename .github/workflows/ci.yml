name: CI

on:
  push:
    branches: [main, dev, release/*, feat/*, feature/*]
  pull_request:
    branches: [main, dev, release/*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm run lint
      - run: npm run format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - name: Check API route coverage
        run: npx tsx scripts/check-route-coverage.ts --ci
      - run: npm run test -- --filter=!@siza/desktop -- --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/coverage-final.json
          flags: unittests
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - run: npm run build -- --filter=!@siza/desktop

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - name: Run security audit (production deps only)
        run: npm audit --audit-level=moderate --omit=dev
      - name: Check outdated dependencies
        run: npm outdated
        continue-on-error: true

  desktop-security-guard:
    name: Desktop Security Guard
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
      - name: Verify tar resolution in desktop dependency graph
        run: npm ls tar --workspace=apps/desktop
      - name: Enforce desktop high severity dependency audit gate
        run: npm audit --workspace=apps/desktop --audit-level=high

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        env:
          SHELLCHECK_OPTS: --rcfile=.shellcheckrc

      - name: Check shell formatting
        run: |
          ERRORS=0
          while IFS= read -r -d '' f; do
            if shfmt -d -i 2 "$f" 2>/dev/null | grep -q .; then
              echo "Formatting violation: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name "*.sh" ! -path "*/node_modules/*" -print0)
          [ "$ERRORS" -eq 0 ] && echo "All shell scripts correctly formatted" || exit 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Skip E2E for dependabot
        if: github.actor == 'dependabot[bot]'
        run: echo 'Skipping E2E — dependabot PRs lack secrets access'
      - uses: Forge-Space/.github/.github/actions/setup-node@6fbe56bc610ddf84b70f213c752b95196bcadd95
        if: github.actor != 'dependabot[bot]'
      - run: npx playwright install --with-deps chromium
        if: github.actor != 'dependabot[bot]'
      - name: Build web app
        if: github.actor != 'dependabot[bot]'
        run: cd apps/web && npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ENABLE_STRIPE_BILLING: 'true'
          NEXT_PUBLIC_ENABLE_USAGE_LIMITS: 'true'
      - name: Run E2E tests
        if: github.actor != 'dependabot[bot]'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_ENABLE_STRIPE_BILLING: 'true'
          NEXT_PUBLIC_ENABLE_USAGE_LIMITS: 'true'
        run: cd apps/web && npx playwright test e2e/auth.spec.ts e2e/billing.spec.ts e2e/landing.spec.ts --project=chromium
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: failure() && github.actor != 'dependabot[bot]'
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
